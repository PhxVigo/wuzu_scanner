# config.toml
# Wuzu Scanner Configuration File
# Copy this file to config.toml and update with your settings:
#   cp example-config.toml config.toml

[database]
# PostgreSQL connection settings
host = "localhost"
port = 5432
database = "wuzu"
user = "wuzu"
password = "your_password"

[hardware]
# UHF Reader settings
uhf_port = "COM3"           # Windows: "COM3", "COM9", etc. | Linux: "/dev/ttyUSB0"
                            # Set to null for auto-detection
uhf_baudrate = 57600        # Usually 57600 or 115200
uhf_power = 20              # RF Power in dBm (0-30, higher = longer range)

[timing]
# Time in seconds before scan ends after last wuzu found
scan_timeout = 5

# Time to display results before returning to main screen
results_display = 10

# Delay between UHF inventory scans (in seconds)
scan_interval = 0.2

# Delay between NFC card polls (in seconds)
nfc_poll_interval = 0.05

# How often to refresh leaderboard from database (in seconds)
leaderboard_refresh = 60

# Seconds of idle on Main Screen before screen saver activates
idle_timeout = 30

# Screen saver text movement interval in seconds
screensaver_interval = 5

# Seconds of idle on Admin Screen before returning to main screen
admin_timeout = 30

# Seconds before unregistered tag prompt auto-cancels
unknown_tag_timeout = 10

[audio]
# Enable/disable all beeps
beep_enabled = true

# Beep configurations: [active_time, silent_time, times]
# active_time: beep duration in 100ms units (1 = 100ms, 2 = 200ms)
# silent_time: pause between beeps in 100ms units
# times: number of beeps

[audio.beeps]
new_wuzu = [1, 0, 1]        # Quick single beep when wuzu is found
hunter_id = [0, 0, 0]       # Longer beep when hunter scans badge
complete = [0, 0, 0]        # Triple beep pattern when scan complete

[scoring]
# Default points value assigned to new wuzus
default_points = 10

# Three options give full flexibility:
#  `scan_out=true`, `cooldown_overrides_scan_out=false`: Must have valid scan-out to score. Cooldown irrelevant. (Scenario I)
#  `scan_out=false`, `cooldown>0`: Cooldown applies, valid scan-out overrides it. (Scenario II)
#  `scan_out=true`, `cooldown_overrides_scan_out=true`, `cooldown>0`: Scan-out required, but expired cooldown can substitute. (Hybrid)
#  `scan_out=false`, `cooldown=0`: Everything scores freely. (Scenario III)

# Minutes before same wuzu can be re-scored (0 = disabled)
cooldown_minutes = 1

# Enable scan-out tracking (wuzu must be scanned out before re-scoring)
scan_out = false

# Allow expired cooldown to substitute for missing scan-out
# Only applies when scan_out = true
cooldown_overrides_scan_out = false

[display]
# Character used for borders
border_char = "─"

# Main title displayed in various screens
main_title = "WUZUScan-76 v1.09b"
